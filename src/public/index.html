<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reze</title>
  <script
    defer
    src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"
  ></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 1rem;
      padding: 2.5rem;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #333;
    }
    p {
      color: #666;
      margin-bottom: 1.5rem;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #5a6fd6;
    }
    .response {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f5f5f5;
      border-radius: 0.5rem;
      font-family: monospace;
      font-size: 0.875rem;
      word-break: break-all;
      transition: opacity 0.3s;
    }
    .response:empty {
      display: none;
    }
    .loading {
      opacity: 0.5;
      pointer-events: none;
    }
    .error {
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <div class="card" x-data="app()">
    <h1 x-text="title"></h1>
    <p>Welcome to the Reze project. Click the button to test the upload API.</p>
    <button
      @click="fetchUpload"
      :disabled="loading"
      :class="{ loading }"
      x-text="loading ? 'Loading...' : 'Test /api/upload'"
    ></button>
    <div
      class="response"
      :class="{ error: isError }"
      x-show="responseText"
      x-text="responseText"
    ></div>
  </div>

  <script>
    function app() {
      return {
        title: '✨ Reze',
        loading: false,
        responseText: '',
        isError: false,
        async fetchUpload() {
          this.loading = true;
          this.responseText = '';
          this.isError = false;
          try {
            const res = await fetch('/api/upload');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            this.responseText = JSON.stringify(data, null, 2);
          } catch (err) {
            this.isError = true;
            this.responseText = `Error: ${err.message}`;
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>
</body>
</html>
