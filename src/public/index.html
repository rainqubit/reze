<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <!-- Alpine.js (CDN) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/dashboard.css" />
</head>
<body class="h-full bg-gradient-to-br from-slate-50 to-slate-100 antialiased">

  <div
    class="max-w-4xl mx-auto px-4 py-6 md:py-10"
    x-data="dashboard()"
    x-init="init()"
  >

    <!-- ── Header ──────────────────────────────────── -->
    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">
          Sensor Dashboard
        </h1>
        <p class="text-sm text-slate-500 mt-0.5">
          <span x-text="dataFile"></span>
          &middot;
          <span x-text="totalReadings + ' readings'"></span>
        </p>
      </div>
      <button
        @click="refresh"
        class="flex items-center gap-1.5 text-sm bg-white border border-slate-200 rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition-colors shadow-sm"
        :disabled="loading"
        :class="{ 'opacity-50 pointer-events-none': loading }"
      >
        <svg class="w-4 h-4" :class="{ 'animate-spin': loading }" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        <span x-text="loading ? 'Loading…' : 'Refresh'"></span>
      </button>
    </header>


    <!-- ── Line Chart ─────────────────────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6 mb-6">
      <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">
        Sensor readings over time
      </h2>
      <div class="chart-wrap" style="min-height:280px;">
        <canvas x-ref="sensorChart"></canvas>
      </div>
    </section>



    <!-- ── Latest Reading ─────────────────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6 mb-6">
      <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">
        Latest Reading
      </h2>

      <template x-if="latestReading">
        <div>
          <div class="flex items-center gap-2 mb-4">
            <svg class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-lg font-semibold text-slate-700" x-text="formatTime(latestReading.time)"></span>
          </div>
          <div class="flex flex-wrap gap-2">
            <template x-for="(f, i) in latestReading.fields" :key="i">
              <span class="field-badge bg-slate-100 text-slate-700">
                <span class="color-dot" :style="'background:' + colors[i % colors.length]"></span>
                <span x-text="displayName(f.name)"></span>
                <span class="font-bold" x-text="f.value"></span>
              </span>
            </template>
          </div>
        </div>
      </template>

      <div x-show="!latestReading" class="text-slate-400 text-sm py-4 text-center">
        No data available yet.
      </div>
    </section>



    <!-- ── All Readings ───────────────────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
      <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">
        All Readings
        <span class="ml-1.5 text-slate-300 font-normal" x-text="'(' + totalReadings + ')'"></span>
      </h2>

      <template x-if="readings.length > 0">
        <div class="space-y-2">
          <template x-for="(r, idx) in readings" :key="idx">
            <div class="reading-row">
              <span class="time-col" x-text="formatTime(r.time)"></span>
              <div class="fields-col">
                <template x-for="(f, fi) in r.fields" :key="fi">
                  <span class="inline-flex items-center gap-1 text-xs text-slate-600 bg-white rounded-full px-2.5 py-0.5 border border-slate-200">
                    <span class="color-dot" :style="'background:' + fieldColor(f.name)"></span>
                    <span x-text="displayName(f.name) + ' '"></span>
                    <span class="font-semibold" x-text="f.value"></span>
                  </span>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>

      <div x-show="readings.length === 0" class="text-slate-400 text-sm py-4 text-center">
        No readings yet. Use <code class="bg-slate-100 px-1 rounded text-xs">POST /api/write</code> to add some.
      </div>
    </section>

    <!-- ── Footer ──────────────────────────────────── -->
    <footer class="text-center text-xs text-slate-400 mt-8 pb-4">
      Reze &middot; Hono + Alpine.js + Chart.js + Tailwind CSS
    </footer>
  </div>

  <script>
function dashboard() {
  return {
    readings: [],
    totalReadings: 0,
    dataFile: 'sensors.txt',
    loading: false,
    chart: null,
    fieldMapping: {},
    colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'],

    get latestReading() {
      return this.readings.length > 0 ? this.readings[this.readings.length - 1] : null;
    },

    displayName(rawName) {
      return this.fieldMapping[rawName] || rawName;
    },

    formatTime(ts) {
      if (!ts) return '';
      const d = new Date(parseInt(ts) * 1000);
      const day = d.getDate();
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const month = months[d.getMonth()];
      const year = d.getFullYear();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const ss = String(d.getSeconds()).padStart(2,'0');
      return `${day} ${month} ${year} ${hh}:${mm}:${ss}`;
    },

    formatTimeShort(ts) {
      if (!ts) return '';
      const d = new Date(parseInt(ts) * 1000);
      const day = d.getDate();
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const month = months[d.getMonth()];
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `${day} ${month} ${hh}:${mm}`;
    },

    fieldColor(name) {
      const idx = this.readings.length > 0 && this.readings[0].fields
        ? this.readings[0].fields.findIndex((f) => f.name === name)
        : -1;
      return idx >= 0 ? this.colors[idx % this.colors.length] : '#94a3b8';
    },

    async init() {
      try {
        const configRes = await fetch('/config.json');
        if (configRes.ok) {
          const cfg = await configRes.json();
          this.fieldMapping = cfg.fieldMapping || {};
        }
      } catch (e) { /* config is optional */ }
      await this.refresh();
    },

    async refresh() {
      this.loading = true;
      try {
        const res = await fetch('/api/readings?path=' + encodeURIComponent(this.dataFile));
        const json = await res.json();
        if (json.error) throw new Error(json.error);
        this.readings = json.readings || [];
        this.totalReadings = json.total || 0;
        // Render chart in the next microtask AFTER Alpine settles
        this.$nextTick(() => {
          this.renderChart();
          // Release loading state only after chart has rendered its first frame,
          // so Alpine's DOM reactivity doesn't detach the canvas mid-draw.
          requestAnimationFrame(() => {
            this.loading = false;
          });
        });
      } catch (err) {
        console.error('Failed to load readings:', err);
        this.loading = false;
      }
    },

    renderChart() {
      const canvas = this.$refs?.sensorChart;
      if (!canvas) return;
      // Verify the canvas actually yields a 2D context (i.e. it's visible & sized)
      let ctx;
      try { ctx = canvas.getContext('2d'); } catch (_) { /* ignore */ }
      if (!ctx) {
        // Canvas not ready yet — retry shortly
        setTimeout(() => this.renderChart(), 50);
        return;
      }
      if (this.chart) { this.chart.destroy(); this.chart = null; }
      if (this.readings.length === 0) return;

      const labels = this.readings.map((r) => this.formatTimeShort(r.time));
      // Use all fields from the config mapping order, or fall back to all fields
      const configKeys = Object.keys(this.fieldMapping);
      const chartFields = configKeys.length > 0
        ? configKeys
        : this.readings[0].fields.map((f) => f.name);
      if (chartFields.length === 0) return;

      const datasets = chartFields.map((name, i) => ({
        label: this.displayName(name),
        data: this.readings.map((r) => {
          const match = r.fields.find((ff) => ff.name === name);
          return match ? parseFloat(match.value) : null;
        }),
        borderColor: this.colors[i % this.colors.length],
        backgroundColor: this.colors[i % this.colors.length] + '18',
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 5,
        tension: 0.3,
        fill: true,
      }));

      // Trap context loss during Chart.js's async render loop.
      // If the canvas is ever detached (e.g. by Alpine DOM diffing),
      // catch the error and schedule a rebuild.
      const safeChart = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            // Ensure the first draw completes synchronously
            duration: 0,
          },
          transitions: {
            active: { animation: { duration: 0 } },
          },
          plugins: {
            legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, padding: 16, font: { size: 12 } } },
            tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                title: (items) => {
                  if (!items.length) return '';
                  return this.formatTime(this.readings[items[0].dataIndex].time);
                },
                label: (ctx) => {
                  const label = ctx.dataset.label || '';
                  const val = ctx.parsed.y;
                  return label + ': ' + val;
                },
              },
            },
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 11 } } },
            y: { beginAtZero: false, grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 } } },
          },
          interaction: { mode: 'nearest', axis: 'x', intersect: false },
        },
      });

      // Patch the draw method to detect & recover from a lost context
      const origDraw = safeChart.draw;
      const self = this;
      safeChart.draw = function () {
        try {
          // Quick check: if the canvas context is gone, rebuild
          if (!this.ctx) {
            self.renderChart();
            return;
          }
          origDraw.call(this);
        } catch (e) {
          // Canvas was detached — schedule a rebuild
          setTimeout(() => self.renderChart(), 0);
        }
      };

      this.chart = safeChart;
    },
  };
}
  </script>
</body>
</html>
