<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/dashboard.css" />
</head>
<body>

  <div class="max-w-4xl mx-auto px-4 py-5 md:py-8" x-data="dashboard()" x-init="init()">

    <!-- ── Header ──────────────────────────────────── -->
    <div class="header">
      <div>
        <h1 x-text="labels.title"></h1>
        <div class="sub">
          <span x-text="dataFile"></span>
          &middot;
          <span x-text="totalReadings + ' ' + labels.readingsSuffix"></span>
        </div>
      </div>
      <button class="btn" @click="refresh" :disabled="loading">
        <svg class="spinner" x-show="loading" style="display:none" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        <svg x-show="!loading" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        <span x-text="loading ? labels.loading : labels.refresh"></span>
      </button>
    </div>


    <!-- ── Time range pills ───────────────────────── -->
    <div class="pill-group">
      <template x-for="r in timeRanges" :key="r.key">
        <button
          @click="setRange(r.key)"
          class="pill"
          :class="{ active: timeRange === r.key }"
          x-text="r.label"
        ></button>
      </template>
    </div>

    <!-- ── Chart ──────────────────────────────────── -->
    <div class="chart-card">
      <h2 x-text="labels.chartTitle"></h2>
      <div class="chart-wrap" style="min-height:240px;">
        <canvas x-ref="sensorChart"></canvas>
      </div>
    </div>

    <!-- ── Latest Reading ─────────────────────────── -->
    <template x-if="latestReading">
      <div>
        <div style="text-align:center;color:#9ca3af;font-size:0.8rem;margin-bottom:0.5rem;" x-text="formatTime(latestReading.time)"></div>
        <div class="sensor-grid">
          <template x-for="(f, i) in latestReading.fields" :key="i">
            <div class="sensor-card">
              <div class="label" x-text="displayName(f.name)"></div>
              <div class="value" x-text="f.value + '°C'" :style="'color:' + colors[i % colors.length]"></div>
              <div class="color-bar" :style="'background:' + colors[i % colors.length]"></div>
            </div>
          </template>
        </div>
      </div>
    </template>
    <div x-show="!latestReading" class="card" style="text-align:center;color:#6b7280;margin-bottom:1.25rem;" x-text="labels.noData"></div>

    <!-- ── All Readings ───────────────────────────── -->
    <div class="sec-title">
      <span x-text="labels.allReadings"></span>
      <span style="color:#4b5563;" x-text="'(' + totalReadings + ')'"></span>
    </div>

    <template x-if="readings.length > 0">
      <div class="reading-list">
        <template x-for="(r, idx) in readings" :key="idx">
          <div class="reading-row">
            <span class="rtime" x-text="formatTime(r.time)"></span>
            <div class="rfields">
              <template x-for="(f, fi) in r.fields" :key="fi">
                <span class="rfield">
                  <span class="dot" :style="'background:' + fieldColor(f.name)"></span>
                  <span x-text="displayName(f.name) + ' '"></span>
                  <span class="val" x-text="f.value"></span>
                </span>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

    <div x-show="readings.length === 0" class="card" style="text-align:center;color:#6b7280;" x-text="labels.noReadings"></div>

    <footer style="text-align:center;font-size:0.7rem;color:#4b5563;margin-top:2rem;padding-bottom:1rem;" x-text="labels.footer"></footer>
  </div>

  <script>
function dashboard() {
  return {
    readings: [],
    totalReadings: 0,
    dataFile: 'sensors.txt',
    loading: false,
    chart: null,
    fieldMapping: {},
    timeRange: '24h',
    timeRanges: [
      { key: '6h', label: '6 Hours' },
      { key: '24h', label: '24 Hours' },
      { key: '72h', label: '3 Days' },
    ],
    _allReadings: [],
    labels: {
      pageTitle: 'Dashboard',
      title: 'Sensor Dashboard',
      chartTitle: 'Readings over time',
      allReadings: 'All Readings',
      noData: 'No data yet',
      noReadings: 'No readings yet',
      refresh: 'Refresh',
      loading: 'Loading',
      footer: 'Reze',
      readingsSuffix: 'readings',
    },
    colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'],

    get readings() {
      // Filter _allReadings by selected time range
      if (this._allReadings.length === 0) return [];
      const rangeSec = { '6h': 21600, '24h': 86400, '72h': 259200 }[this.timeRange] || 86400;
      const latest = parseInt(this._allReadings[this._allReadings.length - 1].time);
      return this._allReadings.filter((r) => latest - parseInt(r.time) <= rangeSec);
    },

    get totalReadings() {
      return this.readings.length;
    },

    get latestReading() {
      return this.readings.length > 0 ? this.readings[this.readings.length - 1] : null;
    },

    setRange(key) {
      this.timeRange = key;
      this.$nextTick(() => this.renderChart());
    },

    displayName(rawName) {
      return this.fieldMapping[rawName] || rawName;
    },

    formatTime(ts) {
      if (!ts) return '';
      const d = new Date(parseInt(ts) * 1000);
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const day = d.getDate(), month = months[d.getMonth()], year = d.getFullYear();
      const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0'), ss = String(d.getSeconds()).padStart(2,'0');
      return `${day} ${month} ${year} ${hh}:${mm}:${ss}`;
    },

    formatTimeShort(ts) {
      if (!ts) return '';
      const d = new Date(parseInt(ts) * 1000);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    },

    fieldColor(name) {
      const idx = this.readings.length > 0 && this.readings[0].fields
        ? this.readings[0].fields.findIndex((f) => f.name === name) : -1;
      return idx >= 0 ? this.colors[idx % this.colors.length] : '#6b7280';
    },

    async init() {
      try {
        const configRes = await fetch('/config.json');
        if (configRes.ok) {
          const cfg = await configRes.json();
          this.fieldMapping = cfg.fieldMapping || {};
          if (cfg.labels) { Object.assign(this.labels, cfg.labels); }
          if (cfg.dataFile) { this.dataFile = cfg.dataFile; }
          document.title = this.labels.pageTitle;
        }
      } catch (_) {}
      await this.refresh();
    },

    async refresh() {
      this.loading = true;
      try {
        const res = await fetch('/api/readings?path=' + encodeURIComponent(this.dataFile));
        const json = await res.json();
        if (json.error) throw new Error(json.error);
        this._allReadings = json.readings || [];
        this.$nextTick(() => {
          this.renderChart();
          requestAnimationFrame(() => { this.loading = false; });
        });
      } catch (err) {
        console.error(err);
        this.loading = false;
      }
    },

    renderChart() {
      const canvas = this.$refs?.sensorChart;
      if (!canvas) return;
      let ctx;
      try { ctx = canvas.getContext('2d'); } catch (_) {}
      if (!ctx) { setTimeout(() => this.renderChart(), 50); return; }
      if (this.chart) { this.chart.destroy(); this.chart = null; }
      if (this.readings.length === 0) return;

      const labels = this.readings.map((r) => this.formatTimeShort(r.time));
      const configKeys = Object.keys(this.fieldMapping);
      const chartFields = configKeys.length > 0 ? configKeys : this.readings[0].fields.map((f) => f.name);
      if (chartFields.length === 0) return;

      const datasets = chartFields.map((name, i) => ({
        label: this.displayName(name),
        data: this.readings.map((r) => {
          const match = r.fields.find((ff) => ff.name === name);
          return match ? parseFloat(match.value) : null;
        }),
        borderColor: this.colors[i % this.colors.length],
        backgroundColor: this.colors[i % this.colors.length] + '30',
        borderWidth: 2,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.3,
        fill: false,
      }));

      const safeChart = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 0 },
          transitions: { active: { animation: { duration: 0 } } },
          plugins: {
            legend: {
              position: 'top',
              labels: {
                color: '#d1d5db',
                usePointStyle: true,
                boxWidth: 8,
                padding: 16,
                font: { size: 11 },
              },
            },
            tooltip: {
              mode: 'index',
              intersect: false,
              backgroundColor: '#1a1a1a',
              titleColor: '#f5f5f5',
              bodyColor: '#d1d5db',
              borderColor: '#2a2a2a',
              borderWidth: 1,
              callbacks: {
                title: (items) => items.length ? this.formatTime(this.readings[items[0].dataIndex].time) : '',
                label: (ctx) => {
                  const label = ctx.dataset.label || '';
                  return label + ': ' + ctx.parsed.y;
                },
              },
            },
          },
          scales: {
            x: {
              grid: { color: '#222' },
              ticks: { color: '#6b7280', font: { size: 10 } },
            },
            y: {
              beginAtZero: false,
              grid: { color: '#222' },
              ticks: { color: '#6b7280', font: { size: 10 } },
            },
          },
          interaction: { mode: 'nearest', axis: 'x', intersect: false },
        },
      });

      const origDraw = safeChart.draw;
      const self = this;
      safeChart.draw = function () {
        try {
          if (!this.ctx) { self.renderChart(); return; }
          origDraw.call(this);
        } catch (_) { setTimeout(() => self.renderChart(), 0); }
      };
      this.chart = safeChart;
    },
  };
}
  </script>
</body>
</html>
